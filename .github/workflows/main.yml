name: Auto Fetch IPTV Sources

on:
  schedule:
    # 每天北京时间早上 6:30 运行一次 (UTC 时间 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch:
    # 允许你在 GitHub 页面上手动点击按钮触发运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-dir: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫脚本生成 M3U
      run: python get_live_sources.py

    - name: 将更新后的 M3U 提交回仓库
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        git add hebei_telecom.m3u
        # 只有在文件有变动时才提交，防止报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新直播源: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
