name: Auto Fetch IPTV Sources

on:
  schedule:
    # 每天北京时间早上 6:30 运行一次 (对应 UTC 时间前一天的 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch:
    # 允许您在 GitHub Actions 页面上手动点击 "Run workflow" 按钮触发运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫脚本生成 M3U
      run: python get_live_sources.py

    - name: 将更新后的 M3U 提交回仓库
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # 严格检查文件是否存在，存在才执行 Git 提交
        if [ -f "hebei_telecom.m3u" ]; then
          git add hebei_telecom.m3u
          # 检查是否有内容变动，有变动才提交，防止因空提交导致工作流报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新直播源: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
        else
          echo "错误：未找到 hebei_telecom.m3u 文件，Python 脚本可能未成功创建它。"
          exit 1
        fi
